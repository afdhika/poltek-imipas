<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="50%" stop-color="#c9a34f"/>
      <stop offset="100%" stop-color="#a8782a"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#12223e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d98a"/>
      <stop offset="100%" stop-color="#c9a34f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer gold hex -->
  <polygon
    points="50,4 93,27.5 93,72.5 50,96 7,72.5 7,27.5"
    fill="url(#goldBorder)"
  />

  <!-- Inner dark hex -->
  <polygon
    points="50,9 88,30.5 88,69.5 50,91 12,69.5 12,30.5"
    fill="url(#bgGrad)"
  />

  <!-- Lettermark: P dan I -->
  <g fill="url(#goldText)" filter="url(#glow)">

    <!-- HURUF P -->
    <!-- Stem vertikal P -->
    <rect x="26" y="32" width="5.5" height="36" rx="1"/>
    <!-- Bowl atas P -->
    <path d="M31.5,32 Q46,32 46,40.5 Q46,49 31.5,49 Z"/>
    <!-- Lubang bowl P (biar kelihatan seperti P bukan D) -->
    <path d="M31.5,35.5 Q42,35.5 42,40.5 Q42,45.5 31.5,45.5 Z" fill="url(#bgGrad)"/>

    <!-- HURUF I -->
    <!-- Top serif I -->
    <rect x="57" y="32" width="17" height="4.5" rx="1"/>
    <!-- Stem I -->
    <rect x="63" y="36.5" width="5" height="27" rx="1"/>
    <!-- Bottom serif I -->
    <rect x="57" y="63.5" width="17" height="4.5" rx="1"/>

  </g>
</svg>
